<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Sissy Random V1</title>
<link rel="manifest" href="manifest.json">
<link rel="stylesheet" href="styles.css">
</head>
<body>
<div class="topcard">
  <h1>💖 Sissy Random</h1>
  <div id="rewardName">No Reward Selected</div>
  <progress id="rewardBar" value="0" max="1"></progress>
  <div id="rewardProgress">0 / 0</div>
  <button id="rollAllBtn">🎲 Roll All</button>
  <div id="rollStatus"></div>
</div>

<div class="tabs">
  <button class="tab" data-tab="chastity">Chastity</button>
  <button class="tab" data-tab="content">Content</button>
  <button class="tab" data-tab="game">Game</button>
  <button class="tab" data-tab="roulette">Roulette</button>
  <button class="tab" data-tab="tasks">Tasks</button>
  <button class="tab" data-tab="outfits">Outfits</button>
</div>

<div id="results" class="card"></div>

<section id="chastity" class="panel">
<h2>Chastity</h2>
<p>Current Probability: <span id="chastityProb"></span>%</p>
</section>

<section id="content" class="panel hidden"><h2>Content</h2></section>
<section id="game" class="panel hidden"><h2>Game</h2></section>
<section id="roulette" class="panel hidden"><h2>Roulette</h2></section>
<section id="tasks" class="panel hidden"><h2>Tasks</h2></section>
<section id="outfits" class="panel hidden"><h2>Outfits</h2></section>

<script src="app.js"></script>
</body>
</html>
